<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Downloader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #FF0000;
    --dark: #0f0f0f;
    --gray: #606060;
    --border: #e5e5e5;
    --light: #f9f9f9;
  }

  body {
    font-family: 'Roboto', Arial, sans-serif;
    background: var(--light);
    color: var(--dark);
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin: 30px 0 40px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
  }

  .header h1 span { color: var(--red); }

  .header p {
    color: var(--gray);
    margin-top: 8px;
    font-size: 14px;
  }

  .input-box {
    display: flex;
    gap: 8px;
    background: white;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 6px;
  }

  .input-box input {
    flex: 1;
    border: none;
    outline: none;
    padding: 12px;
    font-size: 15px;
  }

  .input-box button {
    background: var(--red);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .input-box button:hover { background: #cc0000; }
  .input-box button:disabled { background: #ccc; cursor: not-allowed; }

  /* CONFIG NOTICE */
  .config-notice {
    background: #fff8e1;
    border: 1px solid #ffc107;
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 16px;
    font-size: 13px;
    color: #8a6d00;
  }

  /* RESULT */
  .result {
    margin-top: 30px;
    display: none;
  }

  .result.show { display: block; }

  .video-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .video-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: #000;
  }

  .video-details { padding: 16px; }

  .video-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .video-meta {
    font-size: 13px;
    color: var(--gray);
  }

  .section-label {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--gray);
    margin: 20px 0 10px;
    letter-spacing: 0.5px;
  }

  .quality-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .quality-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--light);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }

  .quality-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .quality-badge {
    background: var(--dark);
    color: white;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .quality-size {
    font-size: 12px;
    color: var(--gray);
  }

  .download-link {
    background: var(--red);
    color: white;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 6px;
    transition: background 0.2s;
  }

  .download-link:hover { background: #cc0000; }

  /* STATES */
  .state-box {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray);
  }

  .loader {
    width: 36px;
    height: 36px;
    border: 4px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: #fdecea;
    border: 1px solid #f5c6cb;
    color: #842029;
    border-radius: 8px;
    padding: 16px;
    margin-top: 20px;
    font-size: 14px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>YT <span>Downloader</span></h1>
    <p>YouTube link paste karein, quality choose karein, download karein</p>
  </div>

  <div class="input-box">
    <input type="text" id="urlInput" placeholder="https://youtube.com/watch?v=..." onkeydown="if(event.key==='Enter') fetchVideo()">
    <button id="fetchBtn" onclick="fetchVideo()">Fetch</button>
  </div>

  <div class="config-notice" id="configNotice">
    ⚙️ Pehle neeche <code>BACKEND_URL</code> apne Render.com server ke URL se replace karein
  </div>

  <div class="result" id="result"></div>
</div>

<script>
  // ⚠️ YE LINE ZAROOR BADLEIN — Render.com deploy karne ke baad jo URL milega wo yahan daalein
  // Example: const BACKEND_URL = 'https://my-yt-backend.onrender.com';
  const BACKEND_URL = 'https://YOUR-RENDER-APP-NAME.onrender.com';

  function formatSize(bytes) {
    if (!bytes) return '';
    const mb = bytes / (1024*1024);
    if (mb > 1024) return (mb/1024).toFixed(1) + ' GB';
    return mb.toFixed(1) + ' MB';
  }

  function formatDuration(s) {
    if (!s) return '';
    const m = Math.floor(s/60);
    const sec = s%60;
    return `${m}:${String(sec).padStart(2,'0')}`;
  }

  function formatViews(n) {
    if (!n) return '';
    if (n >= 1e6) return (n/1e6).toFixed(1) + 'M views';
    if (n >= 1e3) return (n/1e3).toFixed(1) + 'K views';
    return n + ' views';
  }

  async function fetchVideo() {
    const url = document.getElementById('urlInput').value.trim();
    const result = document.getElementById('result');
    const fetchBtn = document.getElementById('fetchBtn');

    if (!url) return;

    if (BACKEND_URL.includes('YOUR-RENDER-APP-NAME')) {
      result.classList.add('show');
      result.innerHTML = `<div class="error-box">⚠️ Pehle code mein BACKEND_URL set karein — Render.com pe deploy karke jo link milega wo daalein.</div>`;
      return;
    }

    fetchBtn.disabled = true;
    fetchBtn.textContent = '...';
    result.classList.add('show');
    result.innerHTML = `<div class="state-box"><div class="loader"></div>Video info nikal rahe hain...</div>`;

    try {
      const res = await fetch(`${BACKEND_URL}/api/video-info`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });

      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Kuch gadbad hui');

      renderResult(data);
    } catch (e) {
      result.innerHTML = `<div class="error-box">⚠️ ${e.message}</div>`;
    }

    fetchBtn.disabled = false;
    fetchBtn.textContent = 'Fetch';
  }

  function renderResult(data) {
    const result = document.getElementById('result');

    let videoQualityHtml = '';
    (data.videoFormats || []).forEach(f => {
      videoQualityHtml += `
        <div class="quality-item">
          <div class="quality-info">
            <span class="quality-badge">${f.quality}</span>
            <span class="quality-size">${f.ext.toUpperCase()} ${f.filesize ? '• ' + formatSize(f.filesize) : ''} ${!f.hasAudio ? '• no audio' : ''}</span>
          </div>
          <a href="${f.url}" class="download-link" download target="_blank">⬇ Download</a>
        </div>`;
    });

    let audioQualityHtml = '';
    (data.audioFormats || []).forEach(f => {
      audioQualityHtml += `
        <div class="quality-item">
          <div class="quality-info">
            <span class="quality-badge">${f.quality}</span>
            <span class="quality-size">${f.ext.toUpperCase()} ${f.filesize ? '• ' + formatSize(f.filesize) : ''}</span>
          </div>
          <a href="${f.url}" class="download-link" download target="_blank">⬇ Download</a>
        </div>`;
    });

    result.innerHTML = `
      <div class="video-card">
        <img class="video-thumb" src="${data.thumbnail}" alt="${data.title}">
        <div class="video-details">
          <div class="video-title">${data.title}</div>
          <div class="video-meta">${data.channel || ''} ${data.duration ? '• ' + formatDuration(data.duration) : ''} ${data.views ? '• ' + formatViews(data.views) : ''}</div>
        </div>
      </div>

      ${videoQualityHtml ? `<div class="section-label">Video Quality</div><div class="quality-list">${videoQualityHtml}</div>` : ''}
      ${audioQualityHtml ? `<div class="section-label">Audio Only (MP3 jaisa)</div><div class="quality-list">${audioQualityHtml}</div>` : ''}
    `;
  }
</script>
</body>
</html>
